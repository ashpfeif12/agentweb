name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
      - name: Build
        run: |
          cd packages/spec && npx tsc && cd ../..
          cd packages/scorer && npx tsc && cd ../..
          cd packages/generator && npx tsc && cd ../..
      - name: Validate examples
        run: |
          for f in examples/*.agent.json; do
            node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('$f', 'utf-8'));
              const required = ['name', 'spec_version', 'description', 'capabilities'];
              const missing = required.filter(k => !data[k]);
              if (missing.length > 0) { console.error('FAIL: $f missing ' + missing.join(', ')); process.exit(1); }
              console.log('✓ $f');
            "
          done
